version: '3.9'

# ─── Shared healthcheck anchors ───────────────────────────────────────────────
x-postgres-healthcheck: &postgres-healthcheck
  test: ['CMD-SHELL', 'pg_isready -U postgres -d flowboard']
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-redis-healthcheck: &redis-healthcheck
  test: ['CMD', 'redis-cli', 'ping']
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 5s

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:15-alpine
    container_name: flowboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: flowboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  redis:
    image: redis:7-alpine
    container_name: flowboard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck: *redis-healthcheck

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: flowboard-server
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/flowboard
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-in-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:4007/api/auth/github/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '4007:4007'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4007/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: flowboard-worker
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/flowboard
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-in-production}
    command: node packages/server/dist/worker-main.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4007}
    container_name: flowboard-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: '0.0.0.0'
      PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      server:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
